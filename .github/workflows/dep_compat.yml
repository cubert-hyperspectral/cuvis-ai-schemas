name: Dependency Compatibility

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: dep-compat-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # cuvis-ai-core ref to fetch the shared audit script from. The script lives on
  # cuvis-ai-core's main (and in every release tag from v0.7.0 onward). Tracking
  # main keeps the audit on the latest floor rules; pin to a release tag instead
  # if the gate ever needs to be fully reproducible.
  AUDIT_REF: main

jobs:
  dep-compat:
    name: Audit dependency floors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Fetch audit script from cuvis-ai-core
        run: >
          curl -fsSL
          https://raw.githubusercontent.com/cubert-hyperspectral/cuvis-ai-core/${{ env.AUDIT_REF }}/scripts/audit_plugin_deps.py
          -o audit_plugin_deps.py

      # The audit only reads pyproject.toml + uv.lock, so run it in a tiny
      # ephemeral environment instead of installing cuvis-ai-core in full.
      - name: Audit dependency floors
        run: >
          uv run --no-project --python 3.11 --with click --with packaging
          python audit_plugin_deps.py --check host --strict
